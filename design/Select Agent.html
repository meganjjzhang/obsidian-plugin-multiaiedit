<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://unpkg.com" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/@fortawesome/fontawesome-free@6.7.2/js/all.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    * {
      scrollbar-width: none;
      scrollbar-color: rgba(0, 0, 0, 0.2) transparent;
    }
  </style>
</head>

<body class="bg-[#1e1e2e] min-h-screen flex items-center justify-center p-6">
<link href="https://fonts.googleapis.cn/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style type="text/tailwindcss">
  @theme {
    --color-surface: #262637;
    --color-surface-hover: #2e2e42;
    --color-border: #363649;
    --color-text-primary: #cdd6f4;
    --color-text-muted: #6c7086;
    --color-bg-base: #1e1e2e;
    --color-overlay: rgba(10, 10, 20, 0.7);
  }
</style>

<style>
  body { font-family: 'DM Sans', sans-serif; }
  .mono { font-family: 'JetBrains Mono', monospace; }
</style>

<!-- Modal Overlay -->
<div class="fixed inset-0 bg-overlay flex items-center justify-center">
  <!-- Modal Container -->
  <div class="w-[380px] bg-surface border border-border rounded-xl shadow-2xl shadow-black/50 overflow-hidden">
    
    <!-- Header -->
    <div class="px-5 pt-5 pb-3 border-b border-border/60">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2.5">
          <div class="w-6 h-6 rounded-lg bg-purple-400/15 border border-purple-400/20 flex items-center justify-center">
            <i data-lucide="cpu" class="w-3.5 h-3.5 text-purple-300/80"></i>
          </div>
          <div>
            <h2 class="text-text-primary text-sm font-semibold">Select Agent</h2>
            <p class="text-text-muted text-[10px] mono mt-0.5">Choose an AI agent to execute edits</p>
          </div>
        </div>
        <button class="w-6 h-6 rounded-md hover:bg-surface-hover flex items-center justify-center text-text-muted hover:text-text-primary transition-colors">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>
    </div>

    <!-- Agent List -->
    <div class="p-3 space-y-1.5">
      
      <!-- Claude Code - Installed / Active -->
      <div class="group bg-bg-base border border-purple-400/20 rounded-lg p-3.5 hover:border-purple-400/35 transition-all cursor-pointer ring-1 ring-purple-400/10">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-lg bg-purple-400/10 border border-purple-400/20 flex items-center justify-center shrink-0">
            <span class="text-purple-300 text-base font-bold mono">C</span>
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2">
              <span class="text-text-primary text-[13px] font-semibold">Claude Code</span>
              <span class="text-[8px] mono px-1.5 py-0.5 rounded-full bg-green-400/15 text-green-300/80 border border-green-400/20">installed</span>
            </div>
            <p class="text-text-muted text-[10px] mono mt-0.5">Anthropic · claude-sonnet-4-20250514</p>
          </div>
          <div class="w-4 h-4 rounded-full border-2 border-purple-400/50 flex items-center justify-center">
            <div class="w-2 h-2 rounded-full bg-purple-400/80"></div>
          </div>
        </div>
      </div>

      <!-- Codex CLI - Installed -->
      <div class="group bg-bg-base border border-border/60 rounded-lg p-3.5 hover:border-text-muted/30 transition-all cursor-pointer">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-lg bg-green-400/8 border border-green-400/15 flex items-center justify-center shrink-0">
            <span class="text-green-300/80 text-base font-bold mono">O</span>
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2">
              <span class="text-text-primary text-[13px] font-semibold">Codex CLI</span>
              <span class="text-[8px] mono px-1.5 py-0.5 rounded-full bg-green-400/15 text-green-300/80 border border-green-400/20">installed</span>
            </div>
            <p class="text-text-muted text-[10px] mono mt-0.5">OpenAI · codex-mini</p>
          </div>
          <div class="w-4 h-4 rounded-full border-2 border-border"></div>
        </div>
      </div>

      <!-- Aider - Installed -->
      <div class="group bg-bg-base border border-border/60 rounded-lg p-3.5 hover:border-text-muted/30 transition-all cursor-pointer">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-lg bg-blue-400/8 border border-blue-400/15 flex items-center justify-center shrink-0">
            <span class="text-blue-300/80 text-base font-bold mono">A</span>
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2">
              <span class="text-text-primary text-[13px] font-semibold">Aider</span>
              <span class="text-[8px] mono px-1.5 py-0.5 rounded-full bg-green-400/15 text-green-300/80 border border-green-400/20">installed</span>
            </div>
            <p class="text-text-muted text-[10px] mono mt-0.5">Paul Gauthier · multi-model</p>
          </div>
          <div class="w-4 h-4 rounded-full border-2 border-border"></div>
        </div>
      </div>

      <!-- Gemini CLI - NOT Installed -->
      <div class="group bg-bg-base/50 border border-border/30 rounded-lg p-3.5 opacity-60 cursor-not-allowed">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-lg bg-text-muted/5 border border-border/40 flex items-center justify-center shrink-0">
            <span class="text-text-muted/50 text-base font-bold mono">G</span>
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2">
              <span class="text-text-muted text-[13px] font-semibold">Gemini CLI</span>
              <span class="text-[8px] mono px-1.5 py-0.5 rounded-full bg-text-muted/10 text-text-muted/60 border border-border/40">missing</span>
            </div>
            <p class="text-text-muted/50 text-[10px] mono mt-0.5">Google · gemini-2.5-pro · not found in PATH</p>
          </div>
          <div class="w-4 h-4 rounded-full border-2 border-border/30"></div>
        </div>
      </div>

    </div>

    <!-- Footer -->
    <div class="px-5 py-3.5 border-t border-border/60 flex items-center justify-between">
      <button class="text-text-muted text-[10px] mono hover:text-text-primary transition-colors flex items-center gap-1">
        <i data-lucide="plus" class="w-3 h-3"></i>
        Configure custom agent
      </button>
      <button class="text-[11px] mono font-semibold px-4 py-2 rounded-md bg-purple-400/15 border border-purple-400/25 text-purple-200/90 hover:bg-purple-400/25 transition-all">
        Confirm
      </button>
    </div>
  </div>
</div>

</body>
<script>if (window.lucide) lucide.createIcons();</script>
</html>
